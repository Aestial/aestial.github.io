
<!DOCTYPE html>
<html lang="en">
    <head>
	<title>WebGL Dynamic Particles + Postprocessing - Momento MX</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
	<style>
	 body {
	     color: #fff;
	     font-family:Monospace;
	     font-size:13px;
	     text-align:center;
	     font-weight: bold;

	     background-color: #000;
	     margin: 0px;
	     overflow: hidden;
	 }

	 #info {
	     color:#fff;
	     position: absolute;
	     top: 0px; width: 100%;
	     padding: 5px;
	 }

	 a {
	     color: red;
	 }
	</style>
    </head>
    <body>

	<div id="container"></div>
	<div id="info">
	    WebGL Dynamic Particles + Postprocessing - Momento MX
	</div>

	<script src="build/three.js"></script>
	<script src="js/controls/OrbitControls.js"></script>
	<script src="js/loaders/BinaryLoader.js"></script>
	
	<script src="js/shaders/ConvolutionShader.js"></script>
	<script src="js/shaders/CopyShader.js"></script>
	<script src="js/shaders/FilmShader.js"></script>
	<script src="js/shaders/FocusShader.js"></script>

	<script src="js/postprocessing/EffectComposer.js"></script>
	<script src="js/postprocessing/MaskPass.js"></script>
	<script src="js/postprocessing/RenderPass.js"></script>
	<script src="js/postprocessing/BloomPass.js"></script>
	<script src="js/postprocessing/ShaderPass.js"></script>
	<script src="js/postprocessing/FilmPass.js"></script>

	<script src="js/Detector.js"></script>

	<script>

	 if ( ! Detector.webgl ) Detector.addGetWebGLMessage();

	 var SCREEN_HEIGHT = window.innerHeight;
	 var SCREEN_WIDTH = window.innerWidth;

	 var container;
	 var camera, scene, renderer, mesh, directionalLight;
	 var controls;
	 var parent, meshes = [], clonemeshes = [];

	 var p;
	 var aloader, bloader;

	 var composer, effectFocus;
	 var clock = new THREE.Clock();

	 init();
	 animate();

	 function init() {

	     container = document.getElementById( 'container' );

	     // Configuracion de escena y camara.

	     scene = new THREE.Scene();
	     scene.background = new THREE.Color( 0x262626 );
	     //scene.fog = new THREE.FogExp2( 0x000104, 0.0000675 );

	     camera = new THREE.PerspectiveCamera( 20, SCREEN_WIDTH / SCREEN_HEIGHT, 1, 50000 );
	     camera.position.set( 0, 500, 4000 );

	     controls = new THREE.OrbitControls( camera );
	     controls.addEventListener( 'change', render );
	     controls.minDistance = 3500.0;
	     controls.maxDistance = 8000.0;
	     controls.minPolarAngle = Math.PI/3;
	     controls.maxPolarAngle = Math.PI/2;
	     controls.minAzimuthAngle = -Math.PI/4;
	     controls.maxAzimuthAngle = Math.PI/4;
	     
	     camera.lookAt( scene.position );

	     // Cargadores.

	     aloader = new THREE.JSONLoader();
	     bloader = new THREE.BinaryLoader();
	     
	     // Configuracion del renderer.

	     renderer = new THREE.WebGLRenderer( { antialias: false } );
	     renderer.setClearColor( scene.background );
	     renderer.setPixelRatio( window.devicePixelRatio );
	     renderer.setSize( SCREEN_WIDTH, SCREEN_HEIGHT );
	     renderer.autoClear = false;
	     renderer.sortObjects = false;
	     container.appendChild( renderer.domElement );

	     // Objeto padre. Contiene particulas y mesh de nucleo.

	     parent = new THREE.Object3D();
	     parent.position.set(0, -200, 0);
	     scene.add( parent );

	     // Carga modelo.
	     
	     aloader.load( "obj/Suzanne.json", function( geometry ) {

		 var d = 650;
		 
		 createObject ( geometry, parent, 1.0, 0, 0, 0, 0xffffff, true );
		 createObject ( geometry, parent, 0.8, -d, 0, -d, 0xffffff, false );
		 createObject ( geometry, parent, 1.2, d, 0, -d, 0xffffff, false );
		 createObject ( geometry, parent, 1.0, -d, 0, d+300, 0xffffff, false );
		 createObject ( geometry, parent, 1.7, d*2, 0, d*2, 0xffffff, false );
		 
		 /*
		 createPointMesh( geometry, parent, 1.0,  0, 0, 0, 0xffffff, true );
		 createMesh( geometry, parent , 0.97, 0, 0, 0, false );
		 */
		 
	     } );
	     
	     // Post procesamiento.
	     
	     var renderModel = new THREE.RenderPass( scene, camera );
	     var effectBloom = new THREE.BloomPass( 0.75 );
	     var effectFilm = new THREE.FilmPass( 0.5, 0.5, 1448, false );

	     effectFocus = new THREE.ShaderPass( THREE.FocusShader );

	     effectFocus.uniforms[ "screenWidth" ].value = window.innerWidth;
	     effectFocus.uniforms[ "screenHeight" ].value = window.innerHeight;

	     effectFocus.renderToScreen = true;

	     composer = new THREE.EffectComposer( renderer );

	     composer.addPass( renderModel );
	     //composer.addPass( effectBloom );
	     //composer.addPass( effectFilm );
	     composer.addPass( effectFocus );

	     //
	     window.addEventListener( 'resize', onWindowResize, false );

	 }

	 //

	 function onWindowResize( event ) {

	     renderer.setSize( window.innerWidth, window.innerHeight );

	     camera.aspect = window.innerWidth / window.innerHeight;
	     camera.updateProjectionMatrix();
	     camera.lookAt( scene.position );

	     composer.reset();
	     effectFocus.uniforms[ "screenWidth" ].value = window.innerWidth;
	     effectFocus.uniforms[ "screenHeight" ].value = window.innerHeight;

	 }

	 // Crea objeto en escena a partir de mesh.

	 function createObject ( geometry, parent, scale, x, y, z, color, dynamic ) {

	     //createLineMesh( geometry, parent, scale, x, y, z ); 
	     createPointMesh( geometry, parent, 1.0 * scale,  x, y, z, color, dynamic );
	     createMesh( geometry, parent , 0.97 * scale, x, y, z, false );
	     
	 }
	     

	 function createMesh( geometry, parent, scale, x, y, z, wire ) {

	     //var color = (wire) ? 0xff0000 : 0x000000
	     var color = (wire) ? 0xff0000 : 0x262626;
		 
	     var meshMat = new THREE.MeshBasicMaterial( {
		 color: color,
		 wireframe: wire,
		 wireframeLinewidth : 0.1
	     } );

	     mesh = new THREE.Mesh( geometry, meshMat );
	     mesh.position.set( x, y, z );
	     mesh.scale.set( scale, scale, scale );
	     parent.add( mesh );

	 }

	 function createLineMesh( geometry, parent, scale, x, y, z ) {

	     // *** ERROR ***
	     geometry.computeLineDistances();
	     
	     var lineMat = new THREE.LineDashedMaterial( {
		 color : 0xffffff,
		 linewidth: 1,
		 scale: 0.1,
		 dashSize: 0.1,
		 gapSize: 1
	     } );

	     mesh = new THREE.LineSegments( geometry, lineMat );
	     mesh.position.set( x, y, z );
	     mesh.scale.set( scale, scale, scale );
	     parent.add(mesh);

	 }	 

	 function createPointMesh( originalGeometry, scene, scale, x, y, z, color, dynamic ) {

	     var i, j, c;

	     var vertexClones = 25;
	     var distScale = 100;

	     var vertices = originalGeometry.vertices;
	     var vl = vertices.length;
	     console.log(vl);

	     var geometry = new THREE.Geometry();
	     var vertices_tmp = [];

	     for ( i = 0; i < vl; i ++ ) {

		 p = vertices[ i ];

		 geometry.vertices[ i ] = p.clone();
		 
		 vertices_tmp[ i ] = [ p.x, p.y, p.z, 0, 0 ];
		 
		 for ( j = 0; j < vertexClones; j++ ) {

		     var newP = p.clone();
		     newP.x += distScale * (Math.random() -0.5);
		     newP.y += distScale * (Math.random() -0.5);
		     newP.z += distScale * (Math.random() -0.5);
		     geometry.vertices[ i + j*vl ] = newP;
		     
		     /*
		     geometry.vertices[ i + j*vl ] = p.clone();
		     geometry.vertices[ i + j*vl ].x += distScale * Math.random();
		     geometry.vertices[ i + j*vl ].y += distScale * Math.random();
		     geometry.vertices[ i + j*vl ].z += distScale * Math.random();
		     */
		     
		     vertices_tmp[ i + j*vl ] = [ newP.x, newP.y, newP.z, 0, 0 ];

		 }		 

	     }

	     mesh = new THREE.Points( geometry, new THREE.PointsMaterial( { size: 15, sizeAttenuation: true, color: color } ) );
	     mesh.scale.x = mesh.scale.y = mesh.scale.z = scale;

	     mesh.position.x = x;
	     mesh.position.y = y;
	     mesh.position.z = z;

	     parent.add( mesh );

	     vl *= vertexClones;

	     meshes.push( {
		 mesh: mesh, vertices: geometry.vertices, vertices_tmp: vertices_tmp, vl: vl,
		 down: 0, up: 0, direction: 0, speed: 35, delay: Math.floor( 200 + 200 * Math.random() ),
		 started: false, start: Math.floor( 100 + 200 * Math.random() ),
		 dynamic: dynamic
	     } );

	 }


	 var j, jl, cm, data, vertices, vertices_tmp, vl, d, vt;

	 function animate () {

	     requestAnimationFrame( animate );
	     controls.update();
	     render();

	 }

	 function render () {
	 
	     delta = 10 * clock.getDelta();
	     delta = delta < 2 ? delta : 2;
	     //parent.rotation.y += -0.02 * delta;

	     var dest = new THREE.Vector3(300, -50, 200);

	     for( j = 0, jl = meshes.length; j < jl; j ++ ) {

		 data = meshes[ j ];
		 mesh = data.mesh;
		 vertices = data.vertices;
		 vertices_tmp = data.vertices_tmp;
		 vl = data.vl;

		 if ( ! data.dynamic ) continue;

		 if ( data.start > 0 ) {
		     data.start -= 1;
		 } else {
		     if ( !data.started ) {
			 data.direction = -1;
			 data.started = true;
		     }
		 }

		 for ( i = 0; i < vl; i ++ ) {

		     p = vertices[ i ];
		     vt = vertices_tmp[ i ];

		     // falling down
		  
		     if ( data.direction < 0 ) {

			 d = Math.abs( p.x - dest.x ) + Math.abs( p.y - dest.y ) + Math.abs( p.z - dest.z );

			 // if ( d < 200 ) {
			 /*
			 if ( d > 1 ) {
			     // p.y += data.direction * data.speed * delta;
			     p.x += 1.5 * ( 0.50 - Math.random() ) * data.speed * delta;
			     p.y += 3.0 * ( 0.25 - Math.random() ) * data.speed * delta;
			     p.z += 1.5 * ( 0.50 - Math.random() ) * data.speed * delta;
			 }
			 */
			 
			 if ( d > 80 ) {
			     p.x += - ( p.x - dest.x ) / d * data.speed * delta * ( 0.85 - Math.random() );
			     p.y += - ( p.y - dest.y ) / d * data.speed * delta * ( 1 + Math.random() );
			     p.z += - ( p.z - dest.z ) / d * data.speed * delta * ( 0.85 - Math.random() );
			 }
			 /*
			 if ( p.y > 0 ) {
			     // p.y += data.direction * data.speed * delta;
			     p.x += 1.5 * ( 0.50 - Math.random() ) * data.speed * delta;
			     p.y += 3.0 * ( 0.25 - Math.random() ) * data.speed * delta;
			     p.z += 1.5 * ( 0.50 - Math.random() ) * data.speed * delta;
			 }
			 */
			 else {
			     if ( ! vt[ 3 ] ) {
				 vt[ 3 ] = 1;
				 data.down += 1;
			     }
			 }
		     }

		     // rising up

		     if ( data.direction > 0 ) {
			 //if ( p.y < vertices_tmp[ i ][ 1 ] ) {
			 //	p.y += data.direction * data.speed * delta;

			 // Calcula distancia de la posicion actual a la posicion deseada del punto
			
			 d = Math.abs( p.x - vt[ 0 ] ) + Math.abs( p.y - vt[ 1 ] ) + Math.abs( p.z - vt[ 2 ] );

			 // Si hay una distancia considerable, mover el punto
			 
			 if ( d > 1 ) {
			     p.x += - ( p.x - vt[ 0 ] ) / d * data.speed * delta * ( 0.85 - Math.random() );
			     p.y += - ( p.y - vt[ 1 ] ) / d * data.speed * delta * ( 1 + Math.random() );
			     p.z += - ( p.z - vt[ 2 ] ) / d * data.speed * delta * ( 0.85 - Math.random() );
			 }
			 
			 else {
			     if ( ! vt[ 4 ] ) {
				 vt[ 4 ] = 1;
				 data.up += 1;
			     }
			 }
		     }
		 }

		 // all down

		 if ( data.down === vl ) {

		     if ( data.delay === 0 ) {

			 data.direction = 1;
			 data.speed = 10;
			 data.down = 0;
			 data.delay = 320;

			 for ( i = 0; i < vl; i ++ ) {

			     vertices_tmp[ i ][ 3 ] = 0;

			 }

		     } else {

			 data.delay -= 1;

		     }


		 }

		 // all up

		 if ( data.up === vl ) {

		     if ( data.delay === 0 ) {

			 data.direction = -1;
			 data.speed = 35;
			 data.up = 0;
			 data.delay = 120;

			 for ( i = 0; i < vl; i ++ ) {

			     vertices_tmp[ i ][ 4 ] = 0;

			 }

		     } else {

			 data.delay -= 1;

		     }


		 }

		 mesh.geometry.verticesNeedUpdate = true;

	     }

	     renderer.clear();
	     composer.render( 0.01 );

	 }

	</script>

    </body>

</html>
