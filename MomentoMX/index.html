<!DOCTYPE html>
<html lang="en">
    <head>
	<title> Particle Demo - MomentoMX </title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
	<style>
	 body {
	     color: #808080;
	     font-family: Monospace;
	     font-size: 13px;
	     text-align: center;
	     background-color: #000000;
	     margin: 0px;
	     overflow: hidden;
	 }
	 div#container {
	     -ms-transform: translate(0, 30px);
	     -webkit-transform: translate(0, 30px);
	     transform: translate(0, 30px);
	 }
	 #info {
	     position: absolute;
	     top: 0px; width: 100%;
	     padding: 5px;
	 }
	 .test {
	     color: #ffffff;
	     background-color: #ffffff;
	     position: absolute;
	 }
	</style>
    </head>
    <body>
	<div id="container"></div>
	<div id="info">Particle Demo - MomentoMX</div>
	<div class="test">Test div</div>
	<script src="build/three.js"></script>
	<script src="js/libs/stats.min.js"></script>
	<script src="js/controls/OrbitControls.js"></script>
	<script src="js/loaders/BinaryLoader.js"></script>
	<script src="js/Boid.js"></script>
	<script src="js/Path.js"></script>
	<script src="obj/Vertex.js"></script>
	<script src="obj/Triangle.js"></script>
	<script>

	 var SCREEN_WIDTH = window.innerWidth,
	     SCREEN_HEIGHT = window.innerHeight,
	     SCREEN_WIDTH_HALF = SCREEN_WIDTH  / 2,
	     SCREEN_HEIGHT_HALF = SCREEN_HEIGHT / 2;

	 var mouseX = 0, mouseY = 0,
	     windowHalfX = window.innerWidth / 2,
	     windowHalfY = window.innerHeight / 2;

	 var camera, cameraTarget, scene, renderer, clock, controls;
	 var debugScene;
	 
	 var spaceParticles, spacePositions, spaceSize, particles, particle;
	 var boid, boids, path, modelIndex, reachedCount, maskMat, labelMaterial;

	 var divElem, divObj, surface;

	 var pathNodes = [
	     { x:-700, y: -50, z: 500 },
	     { x:-500, y: 100, z: 100 },
	     { x: -80, y: 100, z:  80 },
	     { x: 250, y: -50, z: -100 }
	 ];

	 var stats;
	 var nodeGizmos, sphereGizmos;
	 var debug = false; 

	 init();
	 animate();

	 function init() {

	     cameraTarget = new THREE.Vector3(0, 100, 0);
	     camera = new THREE.PerspectiveCamera( 75, SCREEN_WIDTH / SCREEN_HEIGHT, 1, 10000 );
	     camera.position.set(0,100,800);
	     /*
	     camera.addEventListener('change', function() {
		 onCameraChange();
	     });
	     */
	     //camera.lookAt(cameraTarget);

	     clock = new THREE.Clock();
	     clock.start();

	     if (debug) {	 
		 controls = new THREE.OrbitControls( camera );
		 controls.addEventListener( 'change', render );
		 controls.minDistance = 200.0;
		 controls.maxDistance = 2500.0;
		 controls.enableDamping = true;
		 controls.dampingFactor = 0.2;
		 controls.minPolarAngle = Math.PI/3;
		 controls.maxPolarAngle = Math.PI/2;
		 controls.minAzimuthAngle = -Math.PI/3;
		 controls.maxAzimuthAngle = Math.PI/3;
		 //controls.target = cameraTarget;
	     }
	     
	     scene = new THREE.Scene();
	     debugScene = new THREE.Scene();

	     var aloader = new THREE.TextureLoader();
	     var bloader = new THREE.JSONLoader();
	     var cloader = new THREE.ObjectLoader();

	     spaceSize = { x: 3000, y:2000, z:1500 };
	     spaceParticles = [];
	     spaceInfo = [];

	     modelIndex = 2;
	     reachedCount = 0;
	     
	     path = new Path();
	     var radius = 100;
	     var goalRadius = 150;
	     nodeGizmos = [];
	     sphereGizmos = [];

	     ////////////
	     // PATH //
	     ////////////
	     
	     for ( var i = 0; i < pathNodes.length; i++ ) {
		 var vec = pathNodes[i];
		 var node = new THREE.Vector3(vec.x, vec.y, vec.z);
		 path.addNode (node, ( i == modelIndex ) ? goalRadius : radius);
		 
		 // Path debug
		 if ( debug ) {
		     var pathMat = new THREE.MeshBasicMaterial( {
			 color: 0x00ff00,
			 vertexColors: THREE.VertexColors,
			 wireframe: true
		     } );
		     var radGizmoMat = new THREE.MeshBasicMaterial( {
			 color: 0x00ff00,
			 vertexColors: THREE.VertexColors,
			 wireframe: false,
			 transparent: true,
			 opacity: 0.25
		     } );
		     var nodeGizmo = nodeGizmos[i] = new THREE.Mesh( new Triangle(), pathMat );
		     var sphereGizmo = sphereGizmos[i] = new THREE.Mesh ( new THREE.SphereGeometry( path.getRadius(i), 16, 16 ), radGizmoMat);
		     nodeGizmo.position.x = sphereGizmo.position.x = node.x;
		     nodeGizmo.position.y = sphereGizmo.position.y = node.y;
		     nodeGizmo.position.z = sphereGizmo.position.z = node.z;
		     var scale = 10;
		     nodeGizmo.scale.set(scale,scale,scale);
		     
		     if ( i == modelIndex ) {
			 sphereGizmo.material.color.set(0x00ffff);
		     } else if ( i > modelIndex ) {
			 sphereGizmo.material.color.set(0xff0000);
		     }
		     
		     debugScene.add(nodeGizmo);
		     debugScene.add(sphereGizmo);
		 }
		 
	     }
	     
	     particles = [];
	     boids = [];
	     streamInfo = [];
	     var source = { x: -800, y:0, z:200 };
	     var sourceAmp = { x: -800, y:80, z:80 }

	     aloader.load( 'img/particle-4.png', function ( texture ) {
		 var spaceMat = new THREE.PointsMaterial( {
		     map: texture,
		     size: Math.random()*5+5,
		     sizeAttenuation: true,
		     color: 0xffffff,
		     transparent: true,
		     opacity: Math.random()*0.3 + 0.15
		 } );
		 // Space particles
		 for ( var i = 0; i < 128; i++ ) {
		     var particle = spaceParticles[ i ] = new THREE.Points( new Vertex(), spaceMat );
		     particle.position.x = (Math.random() - 0.5) * spaceSize.x;
		     particle.position.y = (Math.random() - 0.5) * spaceSize.y;
		     particle.position.z = (Math.random() - 0.5) * spaceSize.z;
		     
		     // Save the original position
		     spaceInfo[i] = particle.position.clone();
		     // Save a random offset for sinoidal movement
		     spaceInfo[i].x = Math.random() * 10;
		     // Save the original opacity
		     spaceInfo[i].z = particle.material.opacity;
		     scene.add( particle );
		 }
		 // Stream particles
		 for ( var i = 0; i < 2550; i ++ ) {
		     boid = boids[ i ] = new Boid();
		     boid.position.x = Math.random() * sourceAmp.x + source.x;
		     boid.position.y = Math.random() * sourceAmp.y + source.y;
		     boid.position.z = Math.random() * sourceAmp.z + source.z;
		     boid.velocity.x = Math.random() * 2 - 1;
		     boid.velocity.y = Math.random() * 2 - 1;
		     boid.velocity.z = Math.random() * 2 - 1;
		     boid.setIndex(i);
		     boid.setSource(source.x, source.y, source.z);
		     boid.setRandomSource(sourceAmp.x, sourceAmp.y, sourceAmp.z);
		     boid.setModelIndex(modelIndex);
		     boid.setPath(path);
		     var meshMat = new THREE.PointsMaterial( {
			 map: texture,
			 size: Math.random()*4+4,
			 sizeAttenuation: true,
			 color: 0xffffff,
			 transparent: true,
			 opacity: Math.random()*0.4 + 0.6
		     } );
		     particle = particles[ i ] = new THREE.Points( new Vertex(), meshMat );
		     particle.geometry.vertices[0].x = Math.random() * 15 -7.5;
		     particle.geometry.vertices[0].y = Math.random() * 15 -7.5;
		     particle.geometry.vertices[0].z = Math.random() * 15 -7.5;
		     streamInfo [i] = particle.material.opacity;
		     scene.add( particle );
		 }

		 // Load object
		 cloader.load( "obj/Chair.json", function ( object ) {
		     var rot = -Math.PI/4;
		     surface = object.getObjectByName("Surface");
		     var outline = object.getObjectByName("Outline");
		     var mask = object.getObjectByName("Mask");
		     if ( debug ) {
			 console.log(object);
			 console.log(surface.geometry);
			 console.log(outline.geometry);
			 console.log(mask.geometry);
		     }
		     var color = debug ? 0x505050 : 0x000000;
		     var scale = 1.5;
		     maskMat = new THREE.MeshBasicMaterial( {
			 color: color,
			 transparent: true,
			 opacity: 0,
			 wireframe: debug
		     } );
		     var mesh = new THREE.Mesh(mask.geometry, maskMat );
		     mesh.scale.set(scale, scale, scale);
		     mesh.rotateY(rot);
		     scene.add(mesh);
		     var meshVertices = surface.geometry.vertices.length + outline.geometry.vertices.length;
		     for ( var i = 0; i < meshVertices; i++ ) {
			 if ( i < surface.geometry.vertices.length ) {
			     boids[i].setMeshGoal(surface.geometry.vertices[i].applyAxisAngle(new THREE.Vector3(0,1,0), rot).multiplyScalar(scale));
			 } else {
			     var j = i - surface.geometry.vertices.length;
			     boids[i].setMeshGoal(outline.geometry.vertices[j].applyAxisAngle(new THREE.Vector3(0,1,0), rot).multiplyScalar(scale));
			     particles[i].material.size *= 1.5;
			     particles[i].material.opacity = 0.95;
			     streamInfo[i].x = 0.95;
			 }	 
		     }
		     ////////////
		     // BUTTON //
		     ////////////
		     
		     divElem = document.getElementsByClassName('test')[0];
		     console.log(divElem);
		     divObj = new THREE.Object3D();
		     divObj.position = surface.geometry.vertices[0].clone();
		     console.log(divObj);
		     scene.add(divObj);
		     
		 } );
	     }
	     );

	     ////////////
	     // LABELS //
	     ////////////
	     
	     bloader.load( "obj/Diseno.json", function ( geometry ) {
		 var color = debug ? 0x505050 : 0x000000;
		 var scale = 2.5;
		 labelMaterial = new THREE.MeshBasicMaterial( {
		     color: 0xffffff,
		     transparent: true,
		     opacity: 0,
		     wireframe: debug
		 } );
		 var mesh = new THREE.Mesh(geometry, labelMaterial );
		 mesh.rotateX ( Math.PI/2 )
		 mesh.position.set(150, 0, -250);
		 mesh.scale.set(scale, scale, scale);
		 scene.add(mesh);
	     } );

	     
   	     renderer = new THREE.WebGLRenderer({ antialias: true });
	     renderer.autoClear = false;
	     renderer.setClearColor( 0x000000 );
	     renderer.setPixelRatio( window.devicePixelRatio );
	     renderer.setSize( SCREEN_WIDTH, SCREEN_HEIGHT );

	     document.addEventListener( 'mousemove', onDocumentMouseMove, false );
	     document.body.appendChild( renderer.domElement );

	     if (debug) {
		 stats = new Stats();
		 document.getElementById( 'container' ).appendChild(stats.dom);	 
	     }

	     window.addEventListener( 'resize', onWindowResize, false );

	 }

	 function onWindowResize() {
	     camera.aspect = window.innerWidth / window.innerHeight;
	     camera.updateProjectionMatrix();
	     renderer.setSize( window.innerWidth, window.innerHeight );
	 }

	 function onDocumentMouseMove( event ) {
	     var vector = new THREE.Vector3( event.clientX - SCREEN_WIDTH_HALF, - event.clientY + SCREEN_HEIGHT_HALF, 0 );
	     for ( var i = 0, il = boids.length; i < il; i++ ) {
		 boid = boids[ i ];
		 vector.z = boid.position.z;
		 //boid.repulse( vector );
		 //boid.setGoal(vector);
	     }
	     mouseX = event.clientX - windowHalfX;
	     mouseY = event.clientY - windowHalfY;
	 }

	 //
	 function animate() {
	     requestAnimationFrame( animate );
	     if (debug) {
		 stats.begin();
		 controls.update();
	     } 
	     render();
	     if (debug) stats.end();
	 }

	 function render() {
	     // Path nodes movement
	     var nodes = path.getNodes();
	     var originalPos = path.getOriginalPos();
	     var offsets = path.getOffset();
	     var amplitude = 50;
	     for ( var i = 0; i < nodes.length; i++ ) {
		 var yPos = originalPos[i].y + Math.sin(clock.getElapsedTime() + offsets[i]) * amplitude -amplitude/2;
		 if ( i == modelIndex ) {
		     nodes[i].y = 2 * yPos;
		 } else {
		     nodes[i].y = yPos;
		 }
		 if ( debug ) {
		     nodeGizmos[i].position.y = sphereGizmos[i].position.y = yPos;
		 }
	     }
	     
	     // Boid particles movement
	     for ( var i = 0, il = particles.length; i < il; i++ ) {
		 boid = boids[ i ];
		 boid.run( boids );
		 if ( !boid.getCounted() && boid.getReached() ) {
		     reachedCount++;
		     boid.setCounted(true);
		     if (debug) console.log(reachedCount);
		 }   
		 particle = particles[ i ];
		 particle.position.copy( boids[ i ].position );
		 particle.material.opacity = streamInfo [i] * ( spaceSize.x/2 - Math.abs(particle.position.x) ) / spaceSize.x;
	     }
	     
	     // Space particles movement
	     for ( var i = 0; i < 128; i++ ) {
		 particle = spaceParticles[ i ];
		 particle.position.y = spaceInfo[i].y + Math.sin(clock.getElapsedTime()+spaceInfo[i].x)*20 -10;
	     }

	     var opacity = (reachedCount -particles.length/2)/(particles.length/2);
	     
	     // Mask material opacity
	     if ( maskMat != null ) {
		 maskMat.opacity = opacity;
	     }
	     if ( labelMaterial != null ) {
		 labelMaterial.opacity = opacity;
	     }

	     if (!debug) {
		 camera.position.x += ( mouseX - camera.position.x ) * .025;
		 camera.lookAt( scene.position );
		 //onCameraChange();
	     }
	     
	     // Render scenes
	     renderer.clear();
	     renderer.render( scene, camera );
	     renderer.clearDepth();
	     renderer.render( debugScene, camera );
	 }

	 function Reset () {
	     // Stream particles
	     for ( var i = 0; i < 2550; i ++ ) {
		 boid.position.x = Math.random() * sourceAmp.x + source.x;
		 boid.position.y = Math.random() * sourceAmp.y + source.y;
		 boid.position.z = Math.random() * sourceAmp.z + source.z;
		 boid.velocity.x = Math.random() * 2 - 1;
		 boid.velocity.y = Math.random() * 2 - 1;
		 boid.velocity.z = Math.random() * 2 - 1;
		 boid.setSource(source.x, source.y, source.z);
		 boid.setRandomSource(sourceAmp.x, sourceAmp.y, sourceAmp.z);
		 boid.setModelIndex(modelIndex);
		 boid.setPath(path);
	     }
	 }

	 function onCameraChange()
	 {
	     console.log(divObj);
	     var proj = toScreenPosition(divObj, camera);
	     console.log(proy);
	     divElem.style.left = proj.x + 'px';
	     divElem.style.top = proj.y + 'px';
	     
	 }

	 function toScreenPosition(obj, camera)
	 {
	     var vector = new THREE.Vector3();
	     
	     // TODO: need to update this when resize window
	     var widthHalf = 0.5*renderer.context.canvas.width;
	     var heightHalf = 0.5*renderer.context.canvas.height;
	     
	     obj.updateMatrixWorld();
	     vector.setFromMatrixPosition(obj.matrixWorld);
	     vector.project(camera);
	     
	     vector.x = ( vector.x * widthHalf ) + widthHalf;
	     vector.y = - ( vector.y * heightHalf ) + heightHalf;
	     
	     return { 
		 x: vector.x,
		 y: vector.y
	     };

	 }

	</script>

    </body>
</html>
