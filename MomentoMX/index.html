<!DOCTYPE html>
<html lang="en">
    <head>
	<title>Simple Boid</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
	<style>
	 body {
	     color: #808080;
	     font-family:Monospace;
	     font-size:13px;
	     text-align:center;
	     background-color: #000000;
	     margin: 0px;
	     overflow: hidden;
	 }

	 div#container {
	     -ms-transform: translate(0, 30px);
	     -webkit-transform: translate(0, 30px);
	     transform: translate(0, 30px);
	 }
	 #info {
	     position: absolute;
	     top: 0px; width: 100%;
	     padding: 5px;
	 }
	</style>
    </head>
    <body>

	<div id="container"></div>
	<div id="info">Simple Boid - MomentoMX</div>

	<script src="build/three.js"></script>
	<script src="js/libs/stats.min.js"></script>
	<script src="js/controls/OrbitControls.js"></script>
	<script src="js/loaders/BinaryLoader.js"></script>

	<script src="obj/Triangle.js"></script>
	<script src="js/Boid.js"></script>
	<script src="js/Path.js"></script>
	<script>

	 var SCREEN_WIDTH = window.innerWidth,
	     SCREEN_HEIGHT = window.innerHeight,
	     SCREEN_WIDTH_HALF = SCREEN_WIDTH  / 2,
	     SCREEN_HEIGHT_HALF = SCREEN_HEIGHT / 2;

	 var camera, scene, renderer, controls, mesh,
	     particles, particle;

	 var boid, boids, path, modelIndex;

	 var pathNodes = [
	     { x:500, y:0, z:-850 },
	     { x:-500, y:0, z:-600 },
	     { x:300, y:0, z:-300 },
	     { x:50, y:0, z:0 },
	     { x:-200, y:0, z:300 },
	     { x:350, y:0, z:600 },
	     { x:-400, y:0, z:850 }
	 ];

	 var stats;

	 init();
	 animate();

	 function init() {

	     camera = new THREE.PerspectiveCamera( 75, SCREEN_WIDTH / SCREEN_HEIGHT, 1, 10000 );
	     camera.position.set(500,200,400);
	     
	     controls = new THREE.OrbitControls( camera );
	     controls.addEventListener( 'change', render );
	     controls.minDistance = 500.0;
	     controls.maxDistance = 3000.0;
	     controls.enableDamping = true;
	     controls.dampingFactor = 0.2;
	     /*
	     controls.minPolarAngle = Math.PI/3;
	     controls.maxPolarAngle = Math.PI/2;
	     controls.minAzimuthAngle = Math.PI;
	     controls.maxAzimuthAngle = Math.PI;
	     */
	     scene = new THREE.Scene();
	     
	     path = new Path();
	     for ( var i = 0; i < pathNodes.length; i++ ) {
		 var vec = pathNodes[i];
		 var node = new THREE.Vector3(vec.x, vec.y, vec.z);
		 path.addNode (node);
	     }

	     var source = { x: 200, y:0, z:-1000 };
	     modelIndex = 4;
	     particles = [];
	     boids = [];
	     for ( var i = 0; i < 1024; i ++ ) {
		 boid = boids[ i ] = new Boid();
		 //boid.position.x = Math.random() * 1000 + source.x;
		 //boid.position.y = Math.random() * 1000 + source.y;
		 boid.position.x = source.x;
		 boid.position.y = source.y;
		 boid.position.z = -Math.random() * 2000 + source.z;
		 boid.velocity.x = Math.random() * 2 - 1;
		 boid.velocity.y = Math.random() * 2 - 1;
		 boid.velocity.z = Math.random() * 2 - 1;
		 //boid.setAvoidWalls( true );
		 boid.setIndex(i);
		 boid.setSource(source.x, source.y, source.z);
		 boid.setModelIndex(modelIndex);
		 //boid.setWorldSize( 250, 250, 200 );
		 boid.setPath(path);
		 
		 var meshMat = new THREE.PointsMaterial( {
		     size: 3,
		     sizeAttenuation: true,
		     color: 0xffffff
		 } );
		 
		 particle = particles[ i ] = new THREE.Points( new Triangle(), meshMat );
		 particle.scale.set(1,1,1);
		 scene.add( particle );
	     }

	     var cloader = new THREE.JSONLoader();
	     cloader.load( "obj/Suzanne.json", function ( geometry ) {
		 console.log(geometry);
		 var wired = false;
		 var color = wired ? 0x505050 : 0x000000;
		 var scale = 1;
		 var meshMat = new THREE.MeshBasicMaterial( {
		     color: color,
		     wireframe: wired
		 } );
		 mesh = new THREE.Mesh( geometry, meshMat );
		 scene.add(mesh);
		 for ( var i = 0; i < geometry.vertices.length; i++ ) {
		     boids[i].setMeshGoal(geometry.vertices[i].multiplyScalar(scale));
		     //path.addNode(geometry.vertices[i].multiplyScalar(scale));
		 }
		 path.DEBUG_ShowNodes();
	     } );
	     
   	     renderer = new THREE.WebGLRenderer();
	     renderer.setClearColor( 0x000000 );
	     renderer.setPixelRatio( window.devicePixelRatio );
	     renderer.setSize( SCREEN_WIDTH, SCREEN_HEIGHT );

	     document.addEventListener( 'mousemove', onDocumentMouseMove, false );
	     document.body.appendChild( renderer.domElement );

	     stats = new Stats();
	     document.getElementById( 'container' ).appendChild(stats.dom);

	     //

	     window.addEventListener( 'resize', onWindowResize, false );

	 }

	 function onWindowResize() {

	     camera.aspect = window.innerWidth / window.innerHeight;
	     camera.updateProjectionMatrix();

	     renderer.setSize( window.innerWidth, window.innerHeight );

	 }

	 function onDocumentMouseMove( event ) {

	     var vector = new THREE.Vector3( event.clientX - SCREEN_WIDTH_HALF, - event.clientY + SCREEN_HEIGHT_HALF, 0 );

	     for ( var i = 0, il = boids.length; i < il; i++ ) {

		 boid = boids[ i ];

		 vector.z = boid.position.z;

		 //boid.repulse( vector );
		 //boid.setGoal(vector);

	     }

	 }

	 //

	 function animate() {

	     requestAnimationFrame( animate );

	     stats.begin();
	     //controls.update();
	     render();
	     stats.end();

	 }

	 function render() {

	     for ( var i = 0, il = particles.length; i < il; i++ ) {

		 boid = boids[ i ];
		 boid.run( boids );

		 particle = particles[ i ];
		 particle.position.copy( boids[ i ].position );

		 for ( var j = 0, v = particle.geometry.vertices.length; j < v; j++ ) {
		     particle.geometry.vertices[j].x = Math.random() * 30 -15;
		     particle.geometry.vertices[j].y = Math.random() * 30 -15;
		     particle.geometry.vertices[j].z = Math.random() * 30 -15;
		 }
		 
		 color = particle.material.color;
		 color.r = color.g = color.b = ( 1000 - Math.abs(particle.position.z) ) / 2000;
		 //particle.material.opacity = ( 1500 + particle.position.x ) / 3000;		 
	     }

	     renderer.render( scene, camera );

	 }

	</script>

    </body>
</html>
